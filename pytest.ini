[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

testpaths = hsm/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Register custom marks
markers =
    integration: mark a test as an integration test
    workflow: mark a test as a workflow test
    error_handling: mark a test as an error handling test
    recovery: mark a test as a recovery test
    resource: mark a test as a resource management test
    performance: mark a test as a performance test